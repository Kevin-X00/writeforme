<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#8b5e3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WriteForMe · 手写助手</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://api.openai.com">
<style>
/* ── Base ───────────────────────────────────────────────── */
:root {
  --bg: #faf6f0;
  --card: #fffdf9;
  --text: #2c1810;
  --text-light: #6b5a4e;
  --accent: #8b5e3c;
  --accent-light: #a87b57;
  --border: #d9cdc0;
  --shadow: rgba(44,24,16,0.08);
  --radius: 14px;
  --ink: #1a0f0a;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; padding: 0;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom);
}
.container { max-width: 520px; margin: 0 auto; padding: 16px; }

/* ── Header ─────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 0 8px;
}
.header h1 {
  font-size: 20px; font-weight: 600; margin: 0;
  letter-spacing: 1px;
}
.header .badge {
  font-size: 11px; background: var(--accent); color: #fff;
  padding: 2px 8px; border-radius: 10px; font-weight: 500;
}

/* ── Input Area ─────────────────────────────────────────── */
.input-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin: 12px 0;
  box-shadow: 0 2px 12px var(--shadow);
}
.input-card textarea {
  width: 100%; border: none; outline: none; resize: none;
  font-size: 16px; line-height: 1.6;
  background: transparent; color: var(--text);
  min-height: 80px; font-family: inherit;
}
.input-card textarea::placeholder { color: var(--text-light); opacity: 0.6; }

/* ── Scene & Style Pills ────────────────────────────────── */
.pills { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.pill {
  padding: 6px 14px; border-radius: 20px;
  font-size: 13px; border: 1px solid var(--border);
  background: var(--card); color: var(--text-light);
  cursor: pointer; user-select: none; transition: all 0.2s;
}
.pill:active { transform: scale(0.96); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── API Key Row ────────────────────────────────────────── */
.api-row {
  display: flex; align-items: center; gap: 8px;
  margin: 8px 0; font-size: 13px; color: var(--text-light);
}
.api-row input {
  flex: 1; border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 10px; font-size: 13px; background: var(--card);
  color: var(--text); outline: none; min-width: 0;
}
.api-row input:focus { border-color: var(--accent); }

/* ── Generate Button ────────────────────────────────────── */
.btn-gen {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; width: 100%; padding: 14px;
  border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 600;
  background: var(--accent); color: #fff;
  cursor: pointer; transition: opacity 0.2s;
  margin: 8px 0;
}
.btn-gen:disabled { opacity: 0.5; }
.btn-gen:not(:disabled):active { opacity: 0.85; }
.btn-gen.loading { pointer-events: none; }

/* ── Result ─────────────────────────────────────────────── */
.result-card {
  background: var(--card); border-radius: var(--radius);
  padding: 20px; margin: 12px 0;
  box-shadow: 0 2px 12px var(--shadow);
  display: none;
}
.result-card.show { display: block; }

.handwriting-paper {
  background: linear-gradient(180deg, transparent 95%, #e8ddd0 95%);
  background-size: 100% 32px;
  padding: 8px 12px 12px;
  min-height: 200px;
  position: relative;
}
.handwriting-paper .handwriting {
  font-family: 'KaiTi', 'STKaiti', '楷体', serif;
  font-size: 18px; line-height: 32px;
  color: var(--ink); white-space: pre-wrap; word-break: break-all;
  letter-spacing: 0.5px;
}
.handwriting-paper .handwriting::before {
  content: attr(data-title);
  display: block; font-size: 22px; font-weight: bold;
  text-align: center; margin-bottom: 8px;
}

/* Print styles */
@media print {
  body { background: white; }
  .header, .input-card, .api-row, .btn-gen, .toolbar { display: none !important; }
  .result-card { display: block !important; box-shadow: none; border: none; padding: 0; }
  .handwriting-paper { background: none; padding: 0; }
  .handwriting-paper .handwriting { font-size: 20px; line-height: 40px; }
}

/* ── Toolbar ────────────────────────────────────────────── */
.toolbar {
  display: flex; gap: 10px; margin: 8px 0;
}
.toolbar button {
  flex: 1; padding: 10px; border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card); color: var(--text);
  font-size: 14px; cursor: pointer; transition: all 0.2s;
}
.toolbar button:active { background: var(--border); }

/* ── History ────────────────────────────────────────────── */
.history { margin: 12px 0; }
.history summary {
  font-size: 13px; color: var(--text-light);
  cursor: pointer; padding: 8px 0;
}
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px; cursor: pointer;
}
.history-item .h-scene { color: var(--accent); font-size: 11px; }
.history-item .h-preview { color: var(--text-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Mobile Adjustments ─────────────────────────────────── */
@media (max-width: 400px) {
  .container { padding: 12px; }
  .input-card textarea { font-size: 15px; min-height: 70px; }
  .handwriting-paper .handwriting { font-size: 16px; line-height: 28px; }
}

/* ── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: #fff;
  padding: 8px 20px; border-radius: 20px;
  font-size: 14px; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="header">
  <h1>✍ WriteForMe</h1>
  <span class="badge">手写助手</span>
</div>

<!-- Input Card -->
<div class="input-card">
  <textarea id="input" placeholder="描述你想写的内容…&#10;例如：帮我写一封请假条，发烧请一天假" rows="3"></textarea>

  <div class="pills" id="scenes">
    <span class="pill active" data-scene="auto">🎯 自动判断</span>
    <span class="pill" data-scene="leave">📋 请假条</span>
    <span class="pill" data-scene="resign">📄 辞职信</span>
    <span class="pill" data-scene="love">💌 情书/卡片</span>
    <span class="pill" data-scene="notice">📢 通知</span>
    <span class="pill" data-scene="apology">🙏 道歉信</span>
    <span class="pill" data-scene="note">📝 笔记整理</span>
  </div>

  <div class="pills" id="styles">
    <span class="pill active" data-style="formal">正式</span>
    <span class="pill" data-style="warm">亲切</span>
    <span class="pill" data-style="classic">古风</span>
    <span class="pill" data-style="short">简短</span>
  </div>

  <div class="api-row">
    <span>🔑</span>
    <input type="password" id="apikey" placeholder="OpenAI API Key" autocomplete="off">
  </div>
</div>

<!-- Generate Button -->
<button class="btn-gen" id="genBtn" onclick="generate()">✍ 生成手写文字</button>

<!-- Result Card -->
<div class="result-card" id="resultCard">
  <div class="handwriting-paper">
    <div class="handwriting" id="handwriting"></div>
  </div>
  <div class="toolbar">
    <button onclick="printResult()">🖨 打印</button>
    <button onclick="copyResult()">📋 复制</button>
    <button onclick="saveResult()">💾 保存</button>
    <button onclick="regenerate()">🔄 重新生成</button>
  </div>
</div>

<!-- History -->
<details class="history">
  <summary>📜 历史记录 ({{history.length}})</summary>
  <div id="historyList"></div>
</details>

</div>
<div class="toast" id="toast"></div>

<script>
// ─── State ──────────────────────────────────────────────────
const state = {
  scene: 'auto',
  style: 'formal',
  history: JSON.parse(localStorage.getItem('wf_history') || '[]'),
  lastResult: null,
};
const SCENE_NAMES = { auto:'自动', leave:'请假条', resign:'辞职信', love:'情书/卡片', notice:'通知', apology:'道歉信', note:'笔记整理' };
const STYLE_NAMES = { formal:'正式', warm:'亲切', classic:'古风', short:'简短' };

// ─── Init ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Restore API key
  const saved = localStorage.getItem('wf_apikey');
  if (saved) document.getElementById('apikey').value = saved;

  // Scene pills
  document.querySelectorAll('#scenes .pill').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#scenes .pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      state.scene = el.dataset.scene;
    });
  });

  // Style pills
  document.querySelectorAll('#styles .pill').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#styles .pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      state.style = el.dataset.style;
    });
  });

  renderHistory();

  // PWA install
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // Enter key in textarea doesn't submit (allow multiline)
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      // Allow Enter for newline in textarea
    }
  });
});

// ─── Save API Key ────────────────────────────────────────────
function saveKey() {
  const key = document.getElementById('apikey').value.trim();
  if (key) localStorage.setItem('wf_apikey', key);
}

// ─── Generate ────────────────────────────────────────────────
async function generate() {
  const input = document.getElementById('input').value.trim();
  if (!input) { showToast('请先描述你要写的内容'); return; }

  const apiKey = document.getElementById('apikey').value.trim();
  if (!apiKey) { showToast('请填写 OpenAi API Key'); return; }

  saveKey();

  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.classList.add('loading');
  btn.innerHTML = '⏳ 正在生成…';

  try {
    const systemPrompt = `你是一个专业的书面文字生成助手。用户会描述他们需要手写什么场景的文字，你负责生成可以直接手写或打印的正式文本。

当前场景: ${SCENE_NAMES[state.scene]}
语气风格: ${STYLE_NAMES[state.style]}

要求：
1. 生成完整的书面文字，包含必要的格式要素（标题、称呼、正文、落款等）
2. 使用中文，语言正式得体
3. 不要包含解释说明，只输出文字本身
4. 落款处用 ______ 表示需要用户手写签名
5. 日期用 X月X日 表示，用户可自行填写
6. 每段之间空一行
7. 标题单独一行居中`;

    const userPrompt = `用户描述：${input}`;

    const body = {
      model: 'gpt-4o-mini',
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt },
      ],
      temperature: 0.5,
      max_tokens: 2000,
    };

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err.slice(0, 200));
    }

    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';

    state.lastResult = { input, scene: state.scene, style: state.style, text, time: Date.now() };
    showResult(text);

    // Save to history
    state.history.unshift({ input, scene: state.scene, style: state.style, text: text.slice(0, 60), time: Date.now() });
    if (state.history.length > 20) state.history.length = 20;
    localStorage.setItem('wf_history', JSON.stringify(state.history));
    renderHistory();

  } catch (e) {
    showToast('❌ 生成失败: ' + e.message);
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
    btn.innerHTML = '✍ 生成手写文字';
  }
}

// ─── Show Result ────────────────────────────────────────────
function showResult(text) {
  const card = document.getElementById('resultCard');
  const el = document.getElementById('handwriting');
  el.textContent = text;
  // Remove data-title if any
  el.removeAttribute('data-title');
  // Try to extract title from first line
  const lines = text.trim().split('\n');
  if (lines.length > 0 && lines[0].length < 20) {
    // First line might be a title
    el.innerHTML = '<div style="text-align:center;font-size:22px;font-weight:bold;margin-bottom:8px">' + lines[0] + '</div>' + lines.slice(1).join('\n');
  }
  card.classList.add('show');
  // Scroll to result
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
}

// ─── Toolbar Actions ────────────────────────────────────────
function printResult() {
  window.print();
}

function copyResult() {
  if (!state.lastResult) return;
  navigator.clipboard.writeText(state.lastResult.text).then(() => {
    showToast('✅ 已复制到剪贴板');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = state.lastResult.text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制');
  });
}

function saveResult() {
  if (!state.lastResult) return;
  const blob = new Blob([state.lastResult.text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `手写文字_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 已保存到下载文件夹');
}

function regenerate() {
  generate();
}

// ─── History ────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  if (state.history.length === 0) {
    el.innerHTML = '<div style="padding:12px;color:var(--text-light);font-size:13px">暂无记录</div>';
    return;
  }
  el.innerHTML = state.history.map((h, i) => `
    <div class="history-item" onclick="restoreHistory(${i})">
      <div>
        <div class="h-scene">${SCENE_NAMES[h.scene] || h.scene} · ${STYLE_NAMES[h.style] || h.style}</div>
        <div class="h-preview">${h.input.slice(0, 30)}</div>
      </div>
      <div style="font-size:11px;color:var(--text-light)">${new Date(h.time).toLocaleDateString()}</div>
    </div>
  `).join('');
}

function restoreHistory(idx) {
  const h = state.history[idx];
  if (!h) return;
  document.getElementById('input').value = h.input;
  // Set scene
  document.querySelectorAll('#scenes .pill').forEach(p => p.classList.remove('active'));
  const sEl = document.querySelector(`#scenes .pill[data-scene="${h.scene}"]`);
  if (sEl) { sEl.classList.add('active'); state.scene = h.scene; }
  // Set style
  document.querySelectorAll('#styles .pill').forEach(p => p.classList.remove('active'));
  const stEl = document.querySelector(`#styles .pill[data-style="${h.style}"]`);
  if (stEl) { stEl.classList.add('active'); state.style = h.style; }
  // Show
  if (h.text) showResult(h.text);
  state.lastResult = h;
}

// ─── Toast ──────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
