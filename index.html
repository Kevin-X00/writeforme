<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#8b5e3c">
<title>WriteForMe · 手写助手</title>
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#faf6f0;color:#2c1810;min-height:100dvh}
.wrap{max-width:520px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:8px 0 4px}
.card{background:#fffdf9;border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 2px 12px rgba(44,24,16,0.08)}
textarea{width:100%;border:none;outline:none;resize:none;font-size:16px;line-height:1.6;min-height:70px;font-family:inherit;background:transparent;color:#2c1810}
textarea::placeholder{color:#6b5a4e;opacity:.6}
.row{display:flex;align-items:center;gap:10px;margin:10px 0}
.vbtn{display:flex;align-items:center;gap:6px;padding:12px 22px;border-radius:30px;border:2px solid #8b5e3c;background:#fffdf9;font-size:15px;font-weight:500;color:#8b5e3c;cursor:pointer}
.vbtn.rec{background:#e25555;color:#fff;border-color:#e25555;animation:pulse 1.5s infinite}
.vbtn:disabled{opacity:.4}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,85,85,.4)}50%{box-shadow:0 0 0 12px rgba(226,85,85,0)}}
.vstatus{font-size:13px;color:#6b5a4e;flex:1}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.pill{padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid #d9cdc0;background:#fffdf9;color:#6b5a4e;cursor:pointer}
.pill.on{background:#8b5e3c;color:#fff;border-color:#8b5e3c}
.apirow{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:13px;color:#6b5a4e}
.apirow input{flex:1;border:1px solid #d9cdc0;border-radius:8px;padding:6px 10px;font-size:13px;background:#fffdf9;color:#2c1810;outline:none}
.genbtn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:600;background:#8b5e3c;color:#fff;cursor:pointer;margin:8px 0}
.genbtn:disabled{opacity:.5}
.result{display:none;background:#fffdf9;border-radius:14px;padding:20px;margin:12px 0;box-shadow:0 2px 12px rgba(44,24,16,0.08)}
.result.show{display:block}
.paper{background:linear-gradient(180deg,transparent 95%,#e8ddd0 95%);background-size:100% 32px;padding:8px 12px;min-height:200px}
.hand{font-family:'KaiTi','STKaiti','楷体',serif;font-size:18px;line-height:32px;color:#1a0f0a;white-space:pre-wrap;word-break:break-all;letter-spacing:.5px}
.tbar{display:flex;gap:10px;margin:8px 0}
.tbar button{flex:1;padding:10px;border:1px solid #d9cdc0;border-radius:14px;background:#fffdf9;font-size:14px;cursor:pointer}
@media print{body{background:#fff}.np{display:none!important}.result{display:block!important;box-shadow:none;padding:0}.hand{font-size:20px;line-height:40px}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.on{opacity:1}
</style>
</head>
<body>
<div class="wrap">

<h1>✍ WriteForMe</h1>

<div class="card">
<textarea id="input" rows="2" placeholder="打字描述…或点🎤语音输入"></textarea>

<div class="row np">
<button class="vbtn" id="vbtn">🎤 语音输入</button>
<div class="vstatus" id="vstatus">点击🎤开始说话</div>
</div>

<div class="pills np" id="scenes">
<span class="pill on" data-v="auto">🎯 自动</span>
<span class="pill" data-v="leave">📋 请假</span>
<span class="pill" data-v="love">💌 情书</span>
<span class="pill" data-v="notice">📢 通知</span>
<span class="pill" data-v="note">📝 笔记</span>
</div>
<div class="pills np" id="styles">
<span class="pill on" data-v="formal">正式</span>
<span class="pill" data-v="warm">亲切</span>
<span class="pill" data-v="classic">古风</span>
</div>

<div class="apirow np">
<span>🔑</span>
<input type="password" id="apikey" placeholder="OpenAI API Key" autocomplete="off">
</div>
</div>

<button class="genbtn np" id="genbtn" onclick="doGen()">✍ 生成手写文字</button>

<div class="result" id="result">
<div class="paper"><div class="hand" id="hand"></div></div>
<div class="tbar np">
<button onclick="window.print()">🖨 打印</button>
<button onclick="copyText()">📋 复制</button>
</div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
var scene='auto', style='formal';
var recog=null, listening=false;

document.addEventListener('DOMContentLoaded',function(){
  var k=localStorage.getItem('wf_key');
  if(k) document.getElementById('apikey').value=k;
  document.getElementById('apikey').onchange=function(){
    if(this.value) localStorage.setItem('wf_key',this.value);
  };
  document.querySelectorAll('#scenes .pill').forEach(function(el){
    el.onclick=function(){
      document.querySelectorAll('#scenes .pill').forEach(function(p){p.classList.remove('on')});
      this.classList.add('on'); scene=this.dataset.v;
    };
  });
  document.querySelectorAll('#styles .pill').forEach(function(el){
    el.onclick=function(){
      document.querySelectorAll('#styles .pill').forEach(function(p){p.classList.remove('on')});
      this.classList.add('on'); style=this.dataset.v;
    };
  });
  document.getElementById('vbtn').onclick=toggleVoice;
});

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('on')},2500);
}

function toggleVoice(){
  if(listening) stopVoice();
  else startVoice();
}

function startVoice(){
  if(listening) return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('⚠ 浏览器不支持语音'); return;}
  var st=document.getElementById('vstatus');
  var btn=document.getElementById('vbtn');
  st.textContent='⏳ 请求麦克风…';
  btn.disabled=true;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    st.textContent='❌ 不支持'; btn.disabled=false; return;
  }
  navigator.mediaDevices.getUserMedia({audio:true})
  .then(function(stream){
    stream.getTracks().forEach(function(t){t.stop()});
    var r=new SR();
    r.continuous=true; r.interimResults=true; r.lang='zh-CN';
    r.onstart=function(){
      listening=true;
      btn.classList.add('rec'); btn.innerHTML='🛑 停止';
      st.textContent='🎤 说话中…';
    };
    r.onresult=function(e){
      var inp=document.getElementById('input');
      var final='', interim='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      if(final){
        inp.value+=final;
        inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,160)+'px';
        inp.placeholder='';
      }else if(interim){
        inp.placeholder=interim;
      }
    };
    r.onerror=function(e){
      if(e.error==='aborted'||e.error==='no-speech') return;
      st.textContent='⚠ '+e.error;
      listening=false; btn.classList.remove('rec');
      btn.innerHTML='🎤 语音输入'; btn.disabled=false;
    };
    r.onend=function(){
      if(listening){try{r.start()}catch(e2){}}
      else{
        btn.classList.remove('rec'); btn.innerHTML='🎤 语音输入';
        btn.disabled=false;
        st.textContent=document.getElementById('input').value?'✅ 已识别':'点击🎤开始';
      }
    };
    recog=r;
    try{r.start()}catch(e){st.textContent='❌ 启动失败';btn.disabled=false;}
  })
  .catch(function(){st.textContent='❌ 麦克风被拒';btn.disabled=false;});
}

function stopVoice(){
  listening=false;
  if(recog){
    try{recog.abort()}catch(e){}
    try{recog.stop()}catch(e){}
  }
  setTimeout(function(){
    var btn=document.getElementById('vbtn');
    btn.classList.remove('rec'); btn.innerHTML='🎤 语音输入'; btn.disabled=false;
    document.getElementById('vstatus').textContent=document.getElementById('input').value?'✅ 已识别':'点击🎤开始';
  },800);
}

function doGen(){
  var inp=document.getElementById('input').value.trim();
  if(!inp){toast('请描述内容'); return;}
  var key=document.getElementById('apikey').value.trim();
  if(!key){toast('请填 OpenAI Key'); return;}
  if(listening) stopVoice();
  var btn=document.getElementById('genbtn');
  btn.disabled=true; btn.textContent='⏳ 生成中…';
  var sn={auto:'自动',leave:'请假条',love:'情书',notice:'通知',note:'笔记'};
  var sy={formal:'正式',warm:'亲切',classic:'古风'};
  var sys='你是书面文字生成助手。只输出可直接手写的文字。场景:'+(sn[scene]||'')+' 语气:'+(sy[style]||'')+'。保留空白用______，日期用X月X日。';
  fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:sys},{role:'user',content:inp}],temperature:0.5,max_tokens:2000}),
  })
  .then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t.slice(0,200))});
    return r.json();
  })
  .then(function(d){
    var t=d.choices?.[0]?.message?.content||'';
    document.getElementById('hand').innerHTML=t.replace(/\n/g,'<br>');
    document.getElementById('result').classList.add('show');
  })
  .catch(function(e){toast('❌ '+e.message)})
  .finally(function(){btn.disabled=false;btn.textContent='✍ 生成手写文字'});
}

function copyText(){
  var t=document.getElementById('hand').textContent||document.getElementById('hand').innerText;
  if(!t) return;
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('✅ 已复制')});
  else{
    var ta=document.createElement('textarea'); ta.value=t;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✅ 已复制');
  }
}
</script>
</body>
</html>
